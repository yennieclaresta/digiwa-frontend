steps:
  # Step 1: Build the Docker image with the API URL baked in at build time
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "EXPO_PUBLIC_API_BASE_URL=${_EXPO_PUBLIC_API_BASE_URL}"
      - "-t"
      - "${_IMAGE}"
      - "."

  # Step 2: Deploy the new image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_IMAGE}"
      - "--platform"
      - "managed"
      - "--region"
      - "${_REGION}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "1"

images:
  - "${_IMAGE}"

substitutions:
  _IMAGE: "gcr.io/$PROJECT_ID/digiwa-frontend"
  _SERVICE_NAME: "digiwa-frontend"
  _REGION: "asia-southeast2"
  _EXPO_PUBLIC_API_BASE_URL: "https://digiwa-backend-1034235894897.asia-southeast2.run.app"
